<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lincoln Truck & Trailer Repair — Shop TMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f6f9; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
input:focus, select:focus, textarea:focus { border-color: #c0392b !important; outline: none; box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
.tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { font-weight: 700; color: #c0392b; border-bottom-color: #c0392b; }
.tab-btn:not(.active) { color: #888; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {createClient} = supabase;
const sb = createClient('https://paytgvlfkqpyyxoqvaqn.supabase.co','sb_publishable_8U6IiUfM6Q9QaJ5tP0uhMQ_cN-rUNrv');
const EQUIP_TYPES = ["Truck","Trailer","Camper","Van","Pickup","Other"];
const WO_STATUSES = ["Waiting list","Check-in","Inspection","In progress","Waiting for parts","Done"];
const {useState,useEffect,useContext,createContext} = React;
const UserCtx = createContext(null);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const SC = {"Waiting list":{bg:"#e8f4fd",c:"#2980b9",b:"#aed6f1"},"Check-in":{bg:"#eafaf1",c:"#27ae60",b:"#a9dfbf"},"Inspection":{bg:"#fef9e7",c:"#d4ac0d",b:"#f9e79f"},"In progress":{bg:"#f4ecf7",c:"#8e44ad",b:"#d7bde2"},"Waiting for parts":{bg:"#fef5e7",c:"#ca6f1e",b:"#fad7a0"},"Done":{bg:"#eafaf1",c:"#1e8449",b:"#a9dfbf"},"Scheduled":{bg:"#e8f4fd",c:"#2980b9",b:"#aed6f1"}};
const Badge = ({s}) => { const x=SC[s]||{bg:"#f0f0f0",c:"#666",b:"#ddd"}; return <span style={{background:x.bg,color:x.c,border:`1px solid ${x.b}`,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{s}</span>; };
const Loading = () => <div style={{padding:60,textAlign:"center",color:"#888",fontSize:14}}>⏳ Loading...</div>;
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
const fmtDay = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

const Modal = ({title,onClose,children,wide}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:12,width:wide?"min(800px,98vw)":"min(600px,95vw)",maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 24px",borderBottom:"1px solid #eee",position:"sticky",top:0,background:"#fff",zIndex:1}}>
        <h3 style={{margin:0,fontSize:18,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"#666"}}>×</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>
);
const Field = ({label,value,onChange,type="text",options,required,placeholder}) => (
  <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:5}}>{label}{required&&<span style={{color:"#c0392b"}}> *</span>}</label>
    {options ? <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14,background:"#fff"}}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
    : type==="textarea" ? <textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} placeholder={placeholder||""} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14,resize:"vertical"}}/>
    : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={{width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14}}/>}
  </div>
);
const Btn = ({label,onClick,color="#1a1a2e",icon="+"}) => (
  <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:color,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600,whiteSpace:"nowrap"}}>
    <span>{icon}</span>{label}
  </button>
);
const TH = ({c}) => <th style={{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:700,color:"#888",letterSpacing:1,textTransform:"uppercase",borderBottom:"2px solid #f0f0f0"}}>{c}</th>;

// ─── LOGIN ────────────────────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const go = async() => {
    setLoading(true); setErr("");
    const {data,error} = await sb.from('users').select('*').eq('email',email).eq('password',pass).eq('active',true).single();
    setLoading(false);
    if(data) onLogin(data); else setErr("Email sau parola gresita.");
  };
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:16,padding:40,width:"min(420px,95vw)",boxShadow:"0 25px 80px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:64,height:64,background:"linear-gradient(135deg,#c0392b,#e74c3c)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:28}}>🚛</div>
          <h1 style={{margin:"0 0 4px",fontSize:22,fontWeight:800,color:"#1a1a2e"}}>Lincoln Truck & Trailer</h1>
          <p style={{margin:0,color:"#888",fontSize:14}}>Shop Management System</p>
        </div>
        {err&&<div style={{background:"#fdecea",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}
        <Field label="Email" value={email} onChange={setEmail} type="email" required/>
        <Field label="Password" value={pass} onChange={setPass} type="password" required/>
        <button onClick={go} disabled={loading} style={{width:"100%",padding:13,background:"linear-gradient(135deg,#c0392b,#e74c3c)",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8,opacity:loading?0.7:1}}>
          {loading?"Se verifica...":"Intra in sistem"}
        </button>
      </div>
    </div>
  );
};

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const NAV = [
  {id:"dashboard",label:"Dashboard",icon:"📊",s:"MENU"},
  {id:"workorders",label:"Work Orders",icon:"🔧",s:"MENU"},
  {id:"customers",label:"Customers",icon:"👥",s:"MENU"},
  {id:"appointments",label:"Appointments",icon:"📅",s:"MENU"},
  {id:"reminders",label:"Reminders",icon:"🔔",s:"MENU"},
  {id:"employees",label:"Employees",icon:"👤",s:"MENU"},
  {id:"salaries",label:"Salaries",icon:"💰",s:"MENU"},
  {id:"inventory",label:"Inventory",icon:"📦",s:"SUPPORT"},
  {id:"reports",label:"Reports",icon:"📈",s:"SUPPORT"},
  {id:"invoices",label:"Invoices",icon:"🧾",s:"SUPPORT"},
  {id:"estimates",label:"Estimates",icon:"📋",s:"SUPPORT"},
  {id:"settings",label:"Settings",icon:"⚙️",s:"SUPPORT"},
];
const Sidebar = ({active,onNav,user,onLogout}) => (
  <div style={{width:230,background:"#1a1a2e",display:"flex",flexDirection:"column",height:"100vh",position:"fixed",left:0,top:0,zIndex:100}}>
    <div style={{padding:"20px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:38,height:38,background:"linear-gradient(135deg,#c0392b,#e74c3c)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🚛</div>
        <div><div style={{color:"#fff",fontWeight:800,fontSize:13}}>Lincoln Truck</div><div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>& Trailer Repair</div></div>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
      {["MENU","SUPPORT"].map(sec=>(
        <div key={sec}>
          <div style={{padding:"8px 20px 4px",fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:1.5}}>{sec}</div>
          {NAV.filter(n=>n.s===sec).map(item=>(
            <button key={item.id} onClick={()=>onNav(item.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 20px",background:active===item.id?"rgba(192,57,43,0.2)":"none",border:"none",color:active===item.id?"#e74c3c":"rgba(255,255,255,0.6)",cursor:"pointer",textAlign:"left",fontSize:13,fontWeight:active===item.id?600:400,borderLeft:active===item.id?"3px solid #e74c3c":"3px solid transparent"}}>
              <span>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      ))}
    </div>
    <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div style={{width:34,height:34,background:"linear-gradient(135deg,#e74c3c,#c0392b)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>{user.name.charAt(0)}</div>
        <div><div style={{color:"#fff",fontSize:13,fontWeight:600}}>{user.name}</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:11,textTransform:"capitalize"}}>{user.role}</div></div>
      </div>
      <button onClick={onLogout} style={{width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.06)",border:"none",borderRadius:8,color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12}}>⬅ Logout</button>
    </div>
  </div>
);

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const Dashboard = () => {
  const user = useContext(UserCtx);
  const [wos,setWos]=useState([]); const [custs,setCusts]=useState([]); const [reminders,setReminders]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{
    Promise.all([
      sb.from('work_orders').select('*').order('created_at',{ascending:false}),
      sb.from('customers').select('*'),
      sb.from('reminders').select('*').eq('completed',false).lte('reminder_date',new Date().toISOString().split('T')[0])
    ]).then(([w,c,r])=>{setWos(w.data||[]);setCusts(c.data||[]);setReminders(r.data||[]);setLoading(false);});
  },[]);
  if(loading) return <Loading/>;
  const revenue=wos.reduce((s,w)=>s+Number(w.labor)+Number(w.parts),0);
  return (
    <div>
      <div style={{marginBottom:24}}><h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Dashboard</h1><p style={{margin:0,color:"#888"}}>Good day, {user.name.split(" ")[0]}! 👋</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
        {[{l:"Active WOs",v:wos.filter(w=>w.status!=="Done").length,i:"🔧",c:"#3498db"},{l:"In Progress",v:wos.filter(w=>w.status==="In progress").length,i:"⚙️",c:"#8e44ad"},{l:"Customers",v:custs.length,i:"👥",c:"#27ae60"},{l:"Revenue",v:`$${revenue.toLocaleString()}`,i:"💰",c:"#e67e22"}].map(s=>(
          <div key={s.l} style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontSize:26,fontWeight:800,color:"#1a1a2e"}}>{s.v}</div><div style={{fontSize:12,color:"#888",marginTop:4}}>{s.l}</div></div>
              <div style={{width:40,height:40,background:`${s.c}18`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.i}</div>
            </div>
          </div>
        ))}
      </div>
      {reminders.length>0&&(
        <div style={{background:"#fef9e7",border:"1px solid #f9e79f",borderRadius:12,padding:16,marginBottom:20}}>
          <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:"#d4ac0d"}}>⚠️ {reminders.length} Overdue Reminder{reminders.length>1?"s":""}</h3>
          {reminders.slice(0,3).map(r=><div key={r.id} style={{fontSize:13,color:"#555",marginBottom:6}}>• <strong>{r.customer_name}</strong> — {r.equipment_label}: {r.note} <span style={{color:"#e74c3c"}}>(due {fmtDay(r.reminder_date)})</span></div>)}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:700}}>Recent Work Orders</h3>
          {wos.slice(0,5).map(w=>(
            <div key={w.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f5f5f5"}}>
              <div><div style={{fontWeight:600,fontSize:13}}>{w.id} — {w.unit_number}</div><div style={{fontSize:12,color:"#888"}}>{w.customer}</div></div>
              <Badge s={w.status}/>
            </div>
          ))}
          {wos.length===0&&<p style={{color:"#aaa",fontSize:13}}>No work orders yet.</p>}
        </div>
        <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:700}}>Recent Customers</h3>
          {custs.slice(0,5).map(c=>(
            <div key={c.id} style={{padding:"9px 0",borderBottom:"1px solid #f5f5f5"}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
              <div style={{fontSize:12,color:"#888"}}>{c.email} · {c.phone}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── EQUIPMENT MODAL ──────────────────────────────────────────────────────────
const EquipmentModal = ({customerId,customerName,onClose,onSelect}) => {
  const user = useContext(UserCtx);
  const [list,setList]=useState([]); const [loading,setLoading]=useState(true);
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({type:"Truck",year:"",make:"",model:"",vin:"",license_plate:"",notes:""});
  const [viewEquip,setViewEquip]=useState(null);
  const [remForm,setRemForm]=useState({note:"",reminder_date:"",auto_days:""});
  const [addingRem,setAddingRem]=useState(false);
  const [reminders,setReminders]=useState([]);
  const [activeTab,setActiveTab]=useState("history");

  const load=async()=>{
    const{data}=await sb.from('equipment').select('*').eq('customer_id',customerId).order('created_at',{ascending:false});
    setList(data||[]); setLoading(false);
  };
  const loadReminders=async(eqId)=>{
    const{data}=await sb.from('reminders').select('*').eq('equipment_id',eqId).order('created_at',{ascending:false});
    setReminders(data||[]);
  };
  useEffect(()=>{load();},[]);

  const save=async()=>{
    if(!form.type) return;
    await sb.from('equipment').insert([{...form,customer_id:customerId,customer_name:customerName}]);
    setAdding(false); setForm({type:"Truck",year:"",make:"",model:"",vin:"",license_plate:"",notes:""}); load();
  };
  const del=async(id)=>{ if(confirm("Delete this equipment?")){ await sb.from('equipment').delete().eq('id',id); load(); }};
  const openEquip=async(e)=>{ setViewEquip(e); await loadReminders(e.id); };
  const addReminder=async()=>{
    if(!remForm.note) return;
    await sb.from('reminders').insert([{equipment_id:viewEquip.id,customer_name:customerName,equipment_label:`${viewEquip.year} ${viewEquip.make} ${viewEquip.model||viewEquip.type} (${viewEquip.vin||'no VIN'})`,note:remForm.note,reminder_date:remForm.reminder_date||null,auto_days:remForm.auto_days?Number(remForm.auto_days):null,created_by:user.name}]);
    setRemForm({note:"",reminder_date:"",auto_days:""}); setAddingRem(false); loadReminders(viewEquip.id);
  };
  const completeRem=async(id)=>{ await sb.from('reminders').update({completed:true}).eq('id',id); loadReminders(viewEquip.id); };
  const label=e=>`${e.year||''} ${e.make||''} ${e.model||e.type}`.trim();

  if(viewEquip) return (
    <Modal title={`${label(viewEquip)} — ${viewEquip.vin||'No VIN'}`} onClose={()=>setViewEquip(null)} wide>
      <div style={{display:"flex",gap:8,borderBottom:"2px solid #f0f0f0",marginBottom:20}}>
        <button className={`tab-btn${activeTab==="history"?" active":""}`} onClick={()=>setActiveTab("history")}>🔧 Repair History</button>
        <button className={`tab-btn${activeTab==="reminders"?" active":""}`} onClick={()=>setActiveTab("reminders")}>🔔 Reminders ({reminders.filter(r=>!r.completed).length})</button>
      </div>
      {activeTab==="history"&&(
        <div>
          <p style={{color:"#888",fontSize:13}}>Repair history is pulled automatically from Work Orders linked to this equipment's VIN or unit number.</p>
        </div>
      )}
      {activeTab==="reminders"&&(
        <div>
          {!addingRem&&<button onClick={()=>setAddingRem(true)} style={{marginBottom:16,padding:"9px 16px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>+ Add Reminder</button>}
          {addingRem&&(
            <div style={{background:"#f8f9fa",borderRadius:10,padding:16,marginBottom:16}}>
              <Field label="Reminder Note" value={remForm.note} onChange={v=>setRemForm(p=>({...p,note:v}))} placeholder="e.g. Call for oil change, DOT inspection due..." required type="textarea"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Field label="Specific Date" value={remForm.reminder_date} onChange={v=>setRemForm(p=>({...p,reminder_date:v}))} type="date"/>
                <Field label="Auto (days from now)" value={remForm.auto_days} onChange={v=>setRemForm(p=>({...p,auto_days:v}))} type="number" placeholder="e.g. 90"/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addReminder} style={{padding:"9px 16px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>Save Reminder</button>
                <button onClick={()=>setAddingRem(false)} style={{padding:"9px 16px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
              </div>
            </div>
          )}
          {reminders.length===0&&<p style={{color:"#aaa",fontSize:13}}>No reminders yet.</p>}
          {reminders.map(r=>(
            <div key={r.id} style={{border:`1px solid ${r.completed?"#a9dfbf":r.reminder_date&&r.reminder_date<new Date().toISOString().split('T')[0]?"#f5c6cb":"#eee"}`,borderRadius:10,padding:14,marginBottom:10,background:r.completed?"#f9fff9":"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14,color:r.completed?"#888":"#1a1a2e",textDecoration:r.completed?"line-through":""}}>{r.note}</div>
                  <div style={{fontSize:12,color:"#888",marginTop:4}}>
                    {r.reminder_date&&<span>📅 {fmtDay(r.reminder_date)} &nbsp;</span>}
                    {r.auto_days&&<span>🔄 Every {r.auto_days} days &nbsp;</span>}
                    <span>👤 {r.created_by} · {fmtDate(r.created_at)}</span>
                  </div>
                </div>
                {!r.completed&&<button onClick={()=>completeRem(r.id)} style={{padding:"6px 12px",background:"#27ae60",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>✓ Done</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );

  return (
    <Modal title={`Equipment — ${customerName}`} onClose={onClose}>
      {!adding&&<button onClick={()=>setAdding(true)} style={{marginBottom:16,padding:"9px 16px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>+ Add Equipment</button>}
      {adding&&(
        <div style={{background:"#f8f9fa",borderRadius:10,padding:16,marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Type" value={form.type} onChange={v=>setForm(p=>({...p,type:v}))} options={EQUIP_TYPES}/>
            <Field label="Year" value={form.year} onChange={v=>setForm(p=>({...p,year:v}))} placeholder="2020"/>
            <Field label="Make" value={form.make} onChange={v=>setForm(p=>({...p,make:v}))} placeholder="Peterbilt"/>
            <Field label="Model" value={form.model} onChange={v=>setForm(p=>({...p,model:v}))} placeholder="389"/>
            <Field label="VIN" value={form.vin} onChange={v=>setForm(p=>({...p,vin:v}))}/>
            <Field label="License Plate" value={form.license_plate} onChange={v=>setForm(p=>({...p,license_plate:v}))}/>
          </div>
          <Field label="Notes" value={form.notes} onChange={v=>setForm(p=>({...p,notes:v}))} type="textarea"/>
          <div style={{display:"flex",gap:8}}>

const WorkOrders = () => {

  const [customers,setCustomers]=useState([]);
  const [modal,setModal]=useState(false); const [search,setSearch]=useState("");

  const [notesList,setNotesList]=useState([]); const [noteText,setNoteText]=useState("");
  const empty={customer:"",unit_number:"",vin:"",mechanic:"",description:"",labor:0,parts:0,status:"Waiting list",date:new Date().toISOString().split("T")[0]};
  const [form,setForm]=useState(empty);

  const loadWos=async()=>{const{data}=await sb.from('work_orders').select('*').order('created_at',{ascending:false});setWos(data||[]);setLoading(false);};
  const loadCustomers=async()=>{const{data}=await sb.from('customers').select('*').order('name',{ascending:true});setCustomers(data||[]);};
  const loadNotes=async(woId)=>{const{data}=await sb.from('notes').select('*').eq('work_order_id',woId).order('created_at',{ascending:true});setNotesList(data||[]);};
  useEffect(()=>{loadWos();loadCustomers();},[]);

  const filtered=wos.filter(w=>w.id.toLowerCase().includes(search.toLowerCase())||w.customer.toLowerCase().includes(search.toLowerCase())||w.unit_number.toLowerCase().includes(search.toLowerCase()));
  const add=async()=>{
    if(!form.customer||!form.unit_number) return;
    const id=`WO-${String(wos.length+1).padStart(3,"0")}`;
    await sb.from('work_orders').insert([{...form,id,labor:Number(form.labor),parts:Number(form.parts)}]);
    setModal(false);setForm(empty);loadWos();
  };
  const addCustomer=async()=>{
    if(!newCust.name) return;
    await sb.from('customers').insert([newCust]);
    await loadCustomers();
    setForm(p=>({...p,customer:newCust.name}));
    setNewCust({name:"",address:"",phone:"",email:"",notes:""});
    setNewCustModal(false);
  };
  const upd=async(id,status)=>{await sb.from('work_orders').update({status}).eq('id',id);loadWos();};
  const del=async(id)=>{if(confirm("Delete this WO?")){await sb.from('work_orders').delete().eq('id',id);loadWos();}};
  const openNotes=async(wo)=>{setNotesModal(wo);await loadNotes(wo.id);};
  const addNote=async()=>{
    if(!noteText.trim()) return;
    await sb.from('notes').insert([{work_order_id:notesModal.id,customer_name:notesModal.customer,content:noteText.trim(),created_by:user.name}]);
    setNoteText(""); loadNotes(notesModal.id);

  const selEquip=(e)=>{
    setForm(p=>({...p,unit_number:e.vin||e.license_plate||`${e.type}-${e.id}`,vin:e.vin||""}));

      </div>
      <div style={{position:"relative",marginBottom:20,maxWidth:320}}>

      </div>
      <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>

                <div key={w.id} style={{background:"#fff",borderRadius:10,padding:12,marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:12,color:"#c0392b"}}>{w.id}</span>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>openNotes(w)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13}} title="Notes">📝</button>
                      <button onClick={()=>del(w.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:13}}>🗑</button>

                  <div style={{fontSize:11,fontWeight:600,color:"#27ae60",marginBottom:6}}>Labor: ${w.labor} · Parts: ${w.parts}</div>

            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:5}}>Equipment / Unit <span style={{color:"#c0392b"}}>*</span></label>

              {form.customer&&<button onClick={()=>{const c=customers.find(x=>x.name===form.customer);if(c)setEquipModal(c);}} style={{padding:"9px 14px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>📋 Pick</button>}

            <Field label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={WO_STATUSES}/>

          <Field label="Description" value={form.description} onChange={v=>setForm(p=>({...p,description:v}))} type="textarea"/>

  const complete=async(id)=>{await sb.from('reminders').update({completed:true}).eq('id',id);load();};
  const del=async(id)=>{if(confirm("Delete reminder?")){await sb.from('reminders').delete().eq('id',id);load();}};
  const today=new Date().toISOString().split('T')[0];
  const filtered=list.filter(r=>filter==="all"?true:filter==="pending"?!r.completed:filter==="overdue"?!r.completed&&r.reminder_date&&r.reminder_date<today:r.completed);
  if(loading) return <Loading/>;
  return (
    <div>
      <h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Reminders</h1>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["pending","Pending"],["overdue","Overdue 🔴"],["completed","Completed"],["all","All"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:"8px 16px",background:filter===k?"#1a1a2e":"#f0f0f0",color:filter===k?"#fff":"#555",border:"none",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:filter===k?700:400}}>{l}</button>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        {filtered.length===0?<p style={{color:"#aaa",textAlign:"center",padding:30}}>No reminders found.</p>:filtered.map(r=>(
          <div key={r.id} style={{border:`1px solid ${r.completed?"#a9dfbf":r.reminder_date&&r.reminder_date<today?"#f5c6cb":"#eee"}`,borderRadius:10,padding:14,marginBottom:10,background:r.completed?"#f9fff9":r.reminder_date&&r.reminder_date<today?"#fff5f5":"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:r.completed?"#888":"#1a1a2e",textDecoration:r.completed?"line-through":""}}>{r.note}</div>
                <div style={{fontSize:13,color:"#555",marginTop:4}}><strong>{r.customer_name}</strong> — {r.equipment_label}</div>
                <div style={{fontSize:12,color:"#888",marginTop:4}}>
                  {r.reminder_date&&<span>📅 {fmtDay(r.reminder_date)} &nbsp;</span>}
                  {r.auto_days&&<span>🔄 Every {r.auto_days} days &nbsp;</span>}
                  <span>👤 {r.created_by} · {fmtDate(r.created_at)}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginLeft:12}}>
                {!r.completed&&<button onClick={()=>complete(r.id)} style={{padding:"6px 12px",background:"#27ae60",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>✓ Done</button>}
                <button onClick={()=>del(r.id)} style={{padding:"6px 10px",background:"none",border:"1px solid #eee",borderRadius:6,cursor:"pointer",color:"#e74c3c",fontSize:13}}>🗑</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── EMPLOYEES ────────────────────────────────────────────────────────────────
const EmployeesPage = () => {
  const [tab,setTab]=useState("active");
  const [list,setList]=useState([]); const [loading,setLoading]=useState(true);
  const load=async()=>{const{data}=await sb.from('users').select('*').order('created_at');setList(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  if(loading) return <Loading/>;
  const active=list.filter(u=>u.active); const fired=list.filter(u=>!u.active);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Employees</h1>
      </div>
      <div style={{display:"flex",marginBottom:20,borderBottom:"2px solid #f0f0f0"}}>
        {["active","fired"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"10px 20px",background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:tab===t?700:400,color:tab===t?"#c0392b":"#888",borderBottom:tab===t?"2px solid #c0392b":"2px solid transparent",marginBottom:-2}}>{t==="active"?"Active":"Fired"}</button>)}
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        {(tab==="active"?active:fired).map(e=>(
          <div key={e.id} style={{border:"1px solid #eee",borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:44,height:44,background:"linear-gradient(135deg,#c0392b,#e74c3c)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:16}}>{e.name.charAt(0)}</div>
              <div><div style={{fontWeight:700,fontSize:15}}>{e.name}</div><div style={{fontSize:13,color:"#888"}}>{e.role}</div><div style={{fontSize:13,color:"#555"}}>✉️ {e.email}</div></div>
            </div>
          </div>
        ))}
        {(tab==="active"?active:fired).length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa"}}>None.</div>}
      </div>
    </div>
  );
};

// ─── SETTINGS ────────────────────────────────────────────────────────────────
const Settings = () => {
  const currentUser = useContext(UserCtx);
  const [users,setUsers]=useState([]); const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:"",email:"",password:"",role:"mechanic"});
  const load=async()=>{const{data}=await sb.from('users').select('*').order('created_at');setUsers(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const add=async()=>{
    if(!form.name||!form.email||!form.password) return;
    await sb.from('users').insert([{...form,active:true}]);
    setModal(false);setForm({name:"",email:"",password:"",role:"mechanic"});load();
  };
  const toggleActive=async(u)=>{await sb.from('users').update({active:!u.active}).eq('id',u.id);load();};
  const resetPass=async(u)=>{
    const np=prompt(`New password for ${u.name}:`);
    if(np){await sb.from('users').update({password:np}).eq('id',u.id);alert("Password updated!");}
  };
  if(loading) return <Loading/>;
  if(currentUser.role!=="admin") return <div style={{padding:40,textAlign:"center",color:"#888"}}>⛔ Admin access only.</div>;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Settings — Users</h1>
        <Btn label="Add User" onClick={()=>setModal(true)} color="#c0392b"/>
      </div>
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><TH c="Name"/><TH c="Email"/><TH c="Role"/><TH c="Status"/><TH c="Actions"/></tr></thead>
          <tbody>{users.map((u,i)=>(
            <tr key={u.id} style={{background:i%2===0?"#fff":"#fafafa"}}>
              <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5",fontWeight:600}}>{u.name}</td>
              <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{u.email}</td>
              <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5",textTransform:"capitalize"}}>{u.role}</td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5"}}><span style={{padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:u.active?"#eafaf1":"#fdecea",color:u.active?"#27ae60":"#c0392b"}}>{u.active?"Active":"Inactive"}</span></td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5"}}>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>resetPass(u)} style={{padding:"5px 10px",background:"#f0f0f0",border:"none",borderRadius:6,cursor:"pointer",fontSize:12}}>🔑 Password</button>
                  {u.id!==currentUser.id&&<button onClick={()=>toggleActive(u)} style={{padding:"5px 10px",background:u.active?"#fdecea":"#eafaf1",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,color:u.active?"#c0392b":"#27ae60"}}>{u.active?"Deactivate":"Activate"}</button>}
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      {modal&&(
        <Modal title="Add New User" onClose={()=>setModal(false)}>
          <Field label="Full Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} required/>
          <Field label="Email" value={form.email} onChange={v=>setForm(p=>({...p,email:v}))} type="email" required/>
          <Field label="Password" value={form.password} onChange={v=>setForm(p=>({...p,password:v}))} type="password" required/>
          <Field label="Role" value={form.role} onChange={v=>setForm(p=>({...p,role:v}))} options={["mechanic","admin"]}/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <button onClick={()=>setModal(false)} style={{padding:"10px 18px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer"}}>Cancel</button>
            <button onClick={add} style={{padding:"10px 18px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Add User</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── SALARIES ────────────────────────────────────────────────────────────────
const Salaries = () => {
  const [wos,setWos]=useState([]); const [users,setUsers]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{Promise.all([sb.from('work_orders').select('*'),sb.from('users').select('*').eq('active',true)]).then(([w,u])=>{setWos(w.data||[]);setUsers(u.data||[]);setLoading(false);});},[]);
  if(loading) return <Loading/>;
  return (
    <div>
      <h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Salaries</h1>
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between"}}><h3 style={{margin:0,fontSize:15,fontWeight:700}}>Employee Salaries</h3><span style={{fontSize:13,color:"#888",background:"#f8f9fa",padding:"6px 12px",borderRadius:8}}>Mar 2026</span></div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><TH c="Employee"/><TH c="Role"/><TH c="WOs Assigned"/><TH c="Labor Revenue"/><TH c="Total to Pay"/></tr></thead>
          <tbody>{users.map(u=>{
            const myWos=wos.filter(w=>w.mechanic===u.name);
            const rev=myWos.reduce((s,w)=>s+Number(w.labor),0);
            return <tr key={u.id}>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",fontWeight:600}}>{u.name}</td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,textTransform:"capitalize"}}>{u.role}</td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13}}>{myWos.length}</td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,fontWeight:600,color:"#27ae60"}}>${rev.toLocaleString()}</td>
              <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13}}>—</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>
  );
};

// ─── REPORTS / INVOICES / ESTIMATES ──────────────────────────────────────────
const Reports = () => {
  const [wos,setWos]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{sb.from('work_orders').select('*').then(({data})=>{setWos(data||[]);setLoading(false);});},[]);
  if(loading) return <Loading/>;
  const labor=wos.reduce((s,w)=>s+Number(w.labor),0); const parts=wos.reduce((s,w)=>s+Number(w.parts),0);
  return (
    <div>
      <h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Reports</h1>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <h3 style={{margin:"0 0 16px",fontSize:16,fontWeight:700}}>Revenue</h3>
          <div style={{fontSize:32,fontWeight:800,marginBottom:16}}>${(labor+parts).toLocaleString()}</div>
          {[{l:"Labor",v:labor,c:"#3498db"},{l:"Parts",v:parts,c:"#2ecc71"}].map(i=>(
            <div key={i.l} style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:i.c}}/><span style={{fontSize:13,color:"#666"}}>{i.l}</span></div>
              <span style={{fontSize:13,fontWeight:600}}>${i.v.toLocaleString()}</span>
            </div>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:700}}>Work Orders by Status</h3>
          {WO_STATUSES.map(s=><div key={s} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f5f5f5",fontSize:13}}><span><Badge s={s}/></span><span style={{fontWeight:600}}>{wos.filter(w=>w.status===s).length}</span></div>)}
        </div>
      </div>
    </div>
  );
};
const Invoices = () => {
  const [wos,setWos]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{sb.from('work_orders').select('*').eq('status','Done').then(({data})=>{setWos(data||[]);setLoading(false);});},[]);
  if(loading) return <Loading/>;
  return (<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Invoices</h1><Btn label="Create" onClick={()=>{}} color="#c0392b"/></div>
    <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr><TH c="Invoice Nr."/><TH c="WO"/><TH c="Customer"/><TH c="Unit #"/><TH c="Total"/><TH c="Status"/></tr></thead>
      <tbody>{wos.length===0?<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:"#aaa"}}>No completed WOs yet.</td></tr>:wos.map((w,i)=>(
        <tr key={w.id} style={{background:i%2===0?"#fff":"#fafafa"}}>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>INV-{String(i+1).padStart(3,"0")}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.id}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.customer}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.unit_number}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5",fontWeight:700,color:"#27ae60"}}>${(Number(w.labor)+Number(w.parts)).toLocaleString()}</td>
          <td style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5"}}><Badge s="Done"/></td>
        </tr>
      ))}</tbody>
    </table></div></div>);
};
const Estimates = () => {
  const [wos,setWos]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{sb.from('work_orders').select('*').in('status',['Waiting list','Inspection']).then(({data})=>{setWos(data||[]);setLoading(false);});},[]);
  if(loading) return <Loading/>;
  return (<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Estimates</h1><Btn label="Create" onClick={()=>{}} color="#c0392b"/></div>
    <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr><TH c="Estimate Nr."/><TH c="WO"/><TH c="Customer"/><TH c="Unit #"/><TH c="Total"/></tr></thead>
      <tbody>{wos.length===0?<tr><td colSpan={5} style={{textAlign:"center",padding:40,color:"#aaa"}}>No estimates found.</td></tr>:wos.map((w,i)=>(
        <tr key={w.id} style={{background:i%2===0?"#fff":"#fafafa"}}>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>EST-{String(i+1).padStart(3,"0")}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.id}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.customer}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5"}}>{w.unit_number}</td>
          <td style={{padding:"12px 16px",fontSize:13,borderBottom:"1px solid #f5f5f5",fontWeight:600,color:"#e67e22"}}>${(Number(w.labor)+Number(w.parts)).toLocaleString()}</td>
        </tr>
      ))}</tbody>
    </table></div></div>);
};
const Inventory = () => (<div><h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Inventory</h1><div style={{background:"#fff",borderRadius:12,padding:60,textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}><div style={{fontSize:48,marginBottom:16}}>🔧</div><h3 style={{margin:"0 0 8px"}}>Coming Soon</h3><p style={{color:"#888"}}>Parts catalog, stock levels, reorder alerts.</p></div></div>);

// ─── APP ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  if(!user) return <Login onLogin={setUser}/>;
  const pages = {
    dashboard:<Dashboard/>,workorders:<WorkOrders/>,customers:<Customers/>,
    appointments:<Appointments/>,reminders:<RemindersPage/>,employees:<EmployeesPage/>,
    salaries:<Salaries/>,inventory:<Inventory/>,reports:<Reports/>,
    invoices:<Invoices/>,estimates:<Estimates/>,settings:<Settings/>,
  };
  return (
    <UserCtx.Provider value={user}>
      <div style={{display:"flex",minHeight:"100vh",background:"#f4f6f9"}}>
        <Sidebar active={page} onNav={setPage} user={user} onLogout={()=>setUser(null)}/>
        <main style={{marginLeft:230,flex:1,padding:28,minHeight:"100vh"}}>{pages[page]||pages.dashboard}</main>
      </div>
    </UserCtx.Provider>
  );
};
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
