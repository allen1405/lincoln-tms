// ─── WORK ORDERS ─────────────────────────────────────────────────────────────
const WorkOrders = ({wos, setWos, customers}) => {
  const [modal,setModal] = useState(false);
  const [search,setSearch] = useState("");
  const emptyForm = {customer:"",unitNumber:"",vin:"",mechanic:"",description:"",labor:0,parts:0,status:"Waiting list",date:new Date().toISOString().split("T")[0]};
  const [form,setForm] = useState(emptyForm);
  const f = v => k => setForm(p=>({...p,[k]:v}));

  const filtered = wos.filter(w=>
    w.id.toLowerCase().includes(search.toLowerCase())||
    w.customer.toLowerCase().includes(search.toLowerCase())||
    w.unitNumber.toLowerCase().includes(search.toLowerCase())
  );

  const add = () => {
    if(!form.customer||!form.unitNumber) return;
    const id = `WO-${String(wos.length+1).padStart(3,"0")}`;
    setWos([...wos,{...form,id,labor:Number(form.labor),parts:Number(form.parts)}]);
    setModal(false); setForm(emptyForm);
  };
  const upd = (id,status) => setWos(wos.map(w=>w.id===id?{...w,status}:w));
  const del = (id) => { if(confirm("Stergi WO-ul?")) setWos(wos.filter(w=>w.id!==id)); };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Work Orders</h1>
        <Btn label="Add new order" onClick={()=>setModal(true)} color="#c0392b"/>
      </div>
      <div style={{position:"relative",marginBottom:20,maxWidth:320}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Find work orders..." style={{width:"100%",padding:"10px 12px 10px 36px",border:"1px solid #ddd",borderRadius:8,fontSize:14}}/>
      </div>
      <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>
        {WO_STATUSES.map(col => {
          const cards = filtered.filter(w=>w.status===col);
          return (
            <div key={col} style={{minWidth:210,flex:1,background:col==="Done"?"#f0faf4":"#f8f9fa",borderRadius:12,padding:12}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                <Badge s={col}/><span style={{fontSize:13,color:"#888",fontWeight:600}}>{cards.length}</span>
              </div>
              {cards.length===0 ? (
                <div style={{textAlign:"center",color:"#ccc",fontSize:13,padding:"30px 0"}}>Empty</div>
              ) : cards.map(wo=>(
                <div key={wo.id} style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #eee"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#c0392b"}}>{wo.id}</span>
                    <button onClick={()=>del(wo.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:14}}>🗑</button>
                  </div>
                  <div style={{fontWeight:600,fontSize:13,color:"#1a1a2e",marginBottom:3}}>{wo.customer}</div>
                  <div style={{fontSize:12,color:"#666",marginBottom:3}}>🚛 {wo.unitNumber}</div>
                  <div style={{fontSize:12,color:"#888",marginBottom:6}}>{wo.description}</div>
                  <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>👨‍🔧 {wo.mechanic||"Unassigned"}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#27ae60",marginBottom:8}}>Labor: ${wo.labor} · Parts: ${wo.parts}</div>
                  <select value={wo.status} onChange={e=>upd(wo.id,e.target.value)} style={{width:"100%",padding:"5px 8px",border:"1px solid #eee",borderRadius:6,fontSize:11,cursor:"pointer"}}>
                    {WO_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              ))}
            </div>
          );
        })}
      </div>
      {modal && (
        <Modal title="New Work Order" onClose={()=>setModal(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Customer" value={form.customer} onChange={v=>setForm(p=>({...p,customer:v}))} required options={["",...customers.map(c=>c.name)]}/>
            <Field label="Unit Number" value={form.unitNumber} onChange={v=>setForm(p=>({...p,unitNumber:v}))} required/>
            <Field label="VIN" value={form.vin} onChange={v=>setForm(p=>({...p,vin:v}))}/>
            <Field label="Mechanic" value={form.mechanic} onChange={v=>setForm(p=>({...p,mechanic:v}))} options={["",...EMPLOYEES.map(e=>e.name)]}/>
            <Field label="Labor ($)" value={form.labor} onChange={v=>setForm(p=>({...p,labor:v}))} type="number"/>
            <Field label="Parts ($)" value={form.parts} onChange={v=>setForm(p=>({...p,parts:v}))} type="number"/>
            <Field label="Date" value={form.date} onChange={v=>setForm(p=>({...p,date:v}))} type="date"/>
            <Field label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={WO_STATUSES}/>
          </div>
          <Field label="Description" value={form.description} onChange={v=>setForm(p=>({...p,description:v}))} type="textarea"/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:8}}>
            <button onClick={()=>setModal(false)} style={{padding:"10px 18px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer"}}>Cancel</button>
            <button onClick={add} style={{padding:"10px 18px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Create</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

  const [search,setSearch] = useState("");
  const [form,setForm] = useState({name:"",address:"",phone:"",email:"",notes:""});
  const filtered = customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.email.toLowerCase().includes(search.toLowerCase()));
  const add = () => {
    if(!form.name) return;
    setCustomers([...customers,{...form,id:Date.now()}]);
    setModal(false); setForm({name:"",address:"",phone:"",email:"",notes:""});
  };
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Customers</h1>
        <Btn label="Add new customer" onClick={()=>setModal(true)} color="#c0392b"/>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div><h3 style={{margin:"0 0 2px",fontSize:16,fontWeight:700}}>Your Customers</h3><p style={{margin:0,fontSize:13,color:"#888"}}>Total: {filtered.length}</p></div>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{padding:"8px 12px 8px 32px",border:"1px solid #ddd",borderRadius:8,fontSize:13}}/>
          </div>
        </div>
        {filtered.map(c=>(
          <div key={c.id} style={{border:"1px solid #eee",borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:"#1a1a2e",marginBottom:4}}>{c.name}</div>
                <div style={{fontSize:13,color:"#666",marginBottom:4}}>{c.address}</div>
                {c.notes && <div style={{fontSize:12,color:"#888",marginBottom:6}}><strong>Notes:</strong> {c.notes}</div>}
                <div style={{fontSize:13,color:"#555"}}>📞 {c.phone} &nbsp;&nbsp; ✉️ {c.email}</div>
              </div>
              <div style={{display:"flex",gap:8,marginLeft:16}}>
                <button style={{padding:"8px 16px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>Details</button>
                <button onClick={()=>setCustomers(customers.filter(x=>x.id!==c.id))} style={{padding:"8px 12px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>🗑</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <Modal title="Add Customer" onClose={()=>setModal(false)}>
          <Field label="Company Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} required/>
          <Field label="Address" value={form.address} onChange={v=>setForm(p=>({...p,address:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Phone" value={form.phone} onChange={v=>setForm(p=>({...p,phone:v}))}/>
            <Field label="Email" value={form.email} onChange={v=>setForm(p=>({...p,email:v}))} type="email"/>
          </div>
          <Field label="Notes" value={form.notes} onChange={v=>setForm(p=>({...p,notes:v}))} type="textarea"/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <button onClick={()=>setModal(false)} style={{padding:"10px 18px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer"}}>Cancel</button>
            <button onClick={add} style={{padding:"10px 18px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Add Customer</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── APPOINTMENTS ─────────────────────────────────────────────────────────────
const Appointments = ({appts, setAppts, customers}) => {
  const [modal,setModal] = useState(false);
  const [form,setForm] = useState({company:"",unitNumber:"",vin:"",date:"",status:"Scheduled"});
  const add = () => {
    if(!form.company) return;
    setAppts([...appts,{...form,id:Date.now()}]);
    setModal(false); setForm({company:"",unitNumber:"",vin:"",date:"",status:"Scheduled"});
  };
  const TH = ({c}) => <th style={{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:700,color:"#888",letterSpacing:1,textTransform:"uppercase",borderBottom:"2px solid #f0f0f0"}}>{c}</th>;
  const TD = ({c}) => <td style={{padding:"14px 16px",fontSize:13,color:"#444",borderBottom:"1px solid #f5f5f5"}}>{c}</td>;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Appointments</h1>
        <div style={{display:"flex",gap:10}}>
          <button style={{padding:"10px 16px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}}>📋 Copy form link</button>
          <Btn label="Add appointment" onClick={()=>setModal(true)} color="#c0392b"/>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><TH c="No."/><TH c="Company Name"/><TH c="Unit Number"/><TH c="VIN"/><TH c="Date"/><TH c="Status"/><TH c=""/></tr></thead>
          <tbody>
            {appts.length===0 ? <tr><td colSpan={7} style={{textAlign:"center",padding:40,color:"#aaa"}}>No appointments found</td></tr>
            : appts.map((a,i)=>(
              <tr key={a.id} style={{background:i%2===0?"#fff":"#fafafa"}}>
                <TD c={i+1}/><TD c={<strong>{a.company}</strong>}/><TD c={a.unitNumber}/><TD c={<span style={{fontFamily:"monospace",fontSize:12}}>{a.vin}</span>}/><TD c={a.date}/><TD c={<Badge s={a.status}/>}/>
                <td style={{padding:"14px 16px"}}><button onClick={()=>setAppts(appts.filter(x=>x.id!==a.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",fontSize:16}}>🗑</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title="New Appointment" onClose={()=>setModal(false)}>
          <Field label="Company" value={form.company} onChange={v=>setForm(p=>({...p,company:v}))} options={["",...customers.map(c=>c.name)]} required/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Unit Number" value={form.unitNumber} onChange={v=>setForm(p=>({...p,unitNumber:v}))}/>
            <Field label="VIN" value={form.vin} onChange={v=>setForm(p=>({...p,vin:v}))}/>
            <Field label="Date" value={form.date} onChange={v=>setForm(p=>({...p,date:v}))} type="date"/>
            <Field label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={["Scheduled","Pending","Done","Cancelled"]}/>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:8}}>
            <button onClick={()=>setModal(false)} style={{padding:"10px 18px",background:"#f0f0f0",border:"none",borderRadius:8,cursor:"pointer"}}>Cancel</button>
            <button onClick={add} style={{padding:"10px 18px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Add</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── EMPLOYEES ────────────────────────────────────────────────────────────────
const EmployeesPage = () => {
  const [tab,setTab] = useState("active");
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Employees</h1>
        <Btn label="Add new employee" onClick={()=>{}} color="#c0392b"/>
      </div>
      <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"2px solid #f0f0f0"}}>
        {["active","fired"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"10px 20px",background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:tab===t?700:400,color:tab===t?"#c0392b":"#888",borderBottom:tab===t?"2px solid #c0392b":"2px solid transparent",marginBottom:-2}}>
            {t==="active"?"Active Employees":"Fired Employees"}
          </button>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0"}}>
        <div style={{marginBottom:16}}><h3 style={{margin:"0 0 2px",fontSize:16,fontWeight:700}}>Your Employees</h3><p style={{margin:0,fontSize:13,color:"#888"}}>Total: {EMPLOYEES.length}</p></div>
        {tab==="active" && EMPLOYEES.map(e=>(
          <div key={e.id} style={{border:"1px solid #eee",borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:14,alignItems:"center"}}>
                <div style={{width:44,height:44,background:"linear-gradient(135deg,#c0392b,#e74c3c)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:16}}>{e.name.charAt(0)}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:"#1a1a2e"}}>{e.name}</div>
                  <div style={{fontSize:13,color:"#888",marginBottom:4}}>{e.role}</div>
                  <div style={{fontSize:13,color:"#555"}}>📞 {e.phone} &nbsp; ✉️ {e.email}</div>
                </div>
              </div>
              <button style={{padding:"8px 16px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>View more</button>
            </div>
          </div>
        ))}
        {tab==="fired" && <div style={{textAlign:"center",padding:40,color:"#aaa"}}>No fired employees.</div>}
      </div>
    </div>
  );
};

// ─── SALARIES ─────────────────────────────────────────────────────────────────
const Salaries = ({wos}) => {
  const TH = ({c}) => <th style={{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:700,color:"#888",letterSpacing:1,textTransform:"uppercase",borderBottom:"2px solid #f0f0f0"}}>{c}</th>;
  const stats = EMPLOYEES.map(e=>({...e, hours:wos.filter(w=>w.mechanic===e.name).length*4, revenue:wos.filter(w=>w.mechanic===e.name).reduce((s,w)=>s+w.labor,0)}));
  return (
    <div>
      <h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Salaries</h1>
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0",overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:15,fontWeight:700}}>Your Employees Salaries</h3>
          <span style={{fontSize:13,color:"#888",background:"#f8f9fa",padding:"6px 12px",borderRadius:8}}>Mar 2026</span>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><TH c="Employee Name"/><TH c="Tracked Hours"/><TH c="Billable Hours"/><TH c="KPI"/><TH c="Salary Type"/><TH c="Revenue"/><TH c="Total to Pay"/></tr></thead>
          <tbody>
            {stats.map(e=>(
              <tr key={e.id}>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5"}}><strong>{e.name}</strong><div style={{fontSize:11,color:"#888"}}>{e.role}</div></td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,color:"#444"}}>{e.hours.toFixed(1)} hours</td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,color:"#444"}}>{(e.hours*0.8).toFixed(1)} hours</td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,color:"#444"}}>—</td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,color:"#444"}}>Hourly</td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,fontWeight:600,color:"#27ae60"}}>${e.revenue.toLocaleString()}</td>
                <td style={{padding:"14px 16px",borderBottom:"1px solid #f5f5f5",fontSize:13,color:"#444"}}>—</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─── REPORTS ─────────────────────────────────────────────────────────────────
const Reports = ({wos}) => {
  const [period,setPeriod] = useState("All time");
  const labor = wos.reduce((s,w)=>s+w.labor,0);
  const parts = wos.reduce((s,w)=>s+w.parts,0);
  const total = labor+parts;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Reports</h1>
        <button style={{padding:"10px 18px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>+ Generate financial report</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:24}}>
        {["All time","2025","2026","Last quarter","Last month","Last week"].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{padding:"8px 16px",background:period===p?"#1a1a2e":"#f0f0f0",color:period===p?"#fff":"#555",border:"none",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:period===p?700:400}}>{p}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0"}}>
          <h3 style={{margin:"0 0 20px",fontSize:16,fontWeight:700}}>Revenue</h3>
          <div style={{fontSize:32,fontWeight:800,color:"#1a1a2e",marginBottom:16}}>${total.toLocaleString()}</div>
          {[{l:"Labor",v:labor,c:"#3498db"},{l:"Parts sold",v:parts,c:"#2ecc71"},{l:"Shop supplies",v:0,c:"#9b59b6"}].map(i=>(
            <div key={i.l} style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:i.c}}/><span style={{fontSize:13,color:"#666"}}>{i.l}</span></div>
              <span style={{fontSize:13,fontWeight:600}}>${i.v.toLocaleString()}</span>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16}}>
            <div style={{padding:14,background:"#f8f9fa",borderRadius:10}}><div style={{fontSize:20,fontWeight:800}}>$0</div><div style={{fontSize:12,color:"#888"}}>Expenses</div></div>
            <div style={{padding:14,background:"#f8f9fa",borderRadius:10}}><div style={{fontSize:20,fontWeight:800,color:"#27ae60"}}>${total.toLocaleString()}</div><div style={{fontSize:12,color:"#888"}}>Gross profit</div></div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0"}}>
          <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:700}}>Employee Performance</h3>
          {EMPLOYEES.map(e=>{
            const rev = wos.filter(w=>w.mechanic===e.name).reduce((s,w)=>s+w.labor,0);
            return <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f5f5f5",fontSize:13}}><span>{e.name}</span><span style={{fontWeight:700,color:"#27ae60"}}>${rev}</span></div>;
          })}
        </div>
      </div>
    </div>
  );
};

// ─── INVOICES / ESTIMATES ─────────────────────────────────────────────────────
const SimpleTable = ({title, rows, cols, action}) => {
  const TH = ({c}) => <th style={{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:700,color:"#888",letterSpacing:1,textTransform:"uppercase",borderBottom:"2px solid #f0f0f0"}}>{c}</th>;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#1a1a2e"}}>{title}</h1>
        {action}
      </div>
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{cols.map(c=><TH key={c} c={c}/>)}</tr></thead>
          <tbody>
            {rows.length===0 ? <tr><td colSpan={cols.length} style={{textAlign:"center",padding:40,color:"#aaa"}}>No records found</td></tr>
            : rows.map((r,i)=>(
              <tr key={i} style={{background:i%2===0?"#fff":"#fafafa"}}>
                {r.map((cell,j)=><td key={j} style={{padding:"14px 16px",fontSize:13,color:"#444",borderBottom:"1px solid #f5f5f5"}}>{cell}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const Invoices = ({wos}) => {
  const done = wos.filter(w=>w.status==="Done");
  return <SimpleTable title="Invoices" cols={["Invoice Nr.","Work Order","Customer","Unit Number","Total Price","Status"]}
    rows={done.map((w,i)=>[`INV-${String(i+1).padStart(3,"0")}`,w.id,w.customer,w.unitNumber,<strong style={{color:"#27ae60"}}>${(w.labor+w.parts).toLocaleString()}</strong>,<Badge s="Done"/>])}
    action={<Btn label="Create" onClick={()=>{}} color="#c0392b"/>}/>;
};

const Estimates = ({wos}) => {
  const waiting = wos.filter(w=>["Waiting list","Inspection"].includes(w.status));
  return <SimpleTable title="Estimates" cols={["Estimate Nr.","Work Order","Customer","Unit Number","Total Price"]}
    rows={waiting.map((w,i)=>[`EST-${String(i+1).padStart(3,"0")}`,w.id,w.customer,w.unitNumber,<strong style={{color:"#e67e22"}}>${(w.labor+w.parts).toLocaleString()}</strong>])}
    action={<Btn label="Create" onClick={()=>{}} color="#c0392b"/>}/>;
};

const Inventory = () => (
  <div>
    <h1 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:"#1a1a2e"}}>Inventory</h1>
    <div style={{background:"#fff",borderRadius:12,padding:60,textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f0f0f0"}}>
      <div style={{fontSize:48,marginBottom:16}}>🔧</div>
      <h3 style={{margin:"0 0 8px",color:"#1a1a2e"}}>Inventory — Coming Soon</h3>
      <p style={{color:"#888",margin:0}}>Parts catalog, stock levels, reorder alerts.</p>
    </div>
  </div>
);

// ─── APP ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [user,setUser] = useState(null);
  const [page,setPage] = useState("dashboard");
  const [customers,setCustomers] = useState([]);

  if(!user) return <Login onLogin={setUser}/>;

  const pages = {
    dashboard: <Dashboard user={user}/>,
    workorders: <WorkOrders customers={customers}/>,
    customers: <Customers onCustomersLoaded={setCustomers}/>,
    appointments: <Appointments customers={customers}/>,
    employees: <EmployeesPage/>,
    salaries: <Salaries/>,
    inventory: <Inventory/>,
    reports: <Reports/>,
    invoices: <Invoices/>,
    estimates: <Estimates/>,
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f4f6f9"}}>
      <Sidebar active={page} onNav={setPage} user={user} onLogout={()=>setUser(null)}/>
      <main style={{marginLeft:230,flex:1,padding:28,minHeight:"100vh"}}>
        {pages[page]||pages.dashboard}
      </main>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
